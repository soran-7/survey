<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="survey-wrapper">
            <div id="survey-form">
                <h1>Customer Feedback Survey</h1>
                <p class="subtitle">Help us improve by sharing your feedback</p>
                <form id="form">
                    <div class="form-group">
                        <label for="name">Name *</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="rating">Overall Rating (1-5) *</label>
                        <select id="rating" name="rating" required>
                            <option value="">Select a rating</option>
                            <option value="1">1 - Poor</option>
                            <option value="2">2 - Fair</option>
                            <option value="3">3 - Good</option>
                            <option value="4">4 - Very Good</option>
                            <option value="5">5 - Excellent</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="experience">What was your experience?</label>
                        <textarea id="experience" name="experience" rows="4" placeholder="Share your feedback here..."></textarea>
                    </div>

                    <div class="form-group checkbox-group">
                        <label>What would you like to see improved? (Select all that apply)</label>
                        <div class="checkbox-options">
                            <label class="checkbox">
                                <input type="checkbox" name="improvements" value="User Interface">
                                User Interface
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" name="improvements" value="Performance">
                                Performance
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" name="improvements" value="Customer Support">
                                Customer Support
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" name="improvements" value="Features">
                                Features
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">Submit Survey</button>
                    <p id="status-message"></p>
                </form>
            </div>

            <div id="success-message" style="display: none;">
                <h2>Thank You!</h2>
                <p>Your survey response has been recorded. We appreciate your feedback!</p>
                <button class="btn-new-survey" onclick="location.reload()">Submit Another Response</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
