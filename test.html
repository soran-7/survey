<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form - Test It Now</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .survey-wrapper {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        h2 {
            color: #667eea;
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
        }

        .checkbox-group {
            margin-bottom: 25px;
        }

        .checkbox-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: #555;
        }

        .checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .btn-submit,
        .btn-new-survey {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover,
        .btn-new-survey:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active,
        .btn-new-survey:active {
            transform: translateY(0);
        }

        #status-message {
            text-align: center;
            margin-top: 15px;
            min-height: 20px;
        }

        #status-message.success {
            color: #27ae60;
            font-weight: 500;
        }

        #status-message.error {
            color: #e74c3c;
            font-weight: 500;
        }

        #success-message {
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        #success-message p {
            color: #555;
            margin: 20px 0;
            font-size: 16px;
        }

        .data-display {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 13px;
            color: #333;
            max-height: 200px;
            overflow-y: auto;
            word-break: break-word;
        }

        @media (max-width: 600px) {
            .survey-wrapper {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="survey-wrapper">
            <div id="survey-form">
                <h1>Customer Feedback Survey</h1>
                <p class="subtitle">Help us improve by sharing your feedback</p>
                <form id="form">
                    <div class="form-group">
                        <label for="name">Name *</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="rating">Overall Rating (1-5) *</label>
                        <select id="rating" name="rating" required>
                            <option value="">Select a rating</option>
                            <option value="1">1 - Poor</option>
                            <option value="2">2 - Fair</option>
                            <option value="3">3 - Good</option>
                            <option value="4">4 - Very Good</option>
                            <option value="5">5 - Excellent</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="experience">What was your experience?</label>
                        <textarea id="experience" name="experience" rows="4" placeholder="Share your feedback here..."></textarea>
                    </div>

                    <div class="form-group checkbox-group">
                        <label>What would you like to see improved? (Select all that apply)</label>
                        <div class="checkbox-options">
                            <label class="checkbox">
                                <input type="checkbox" name="improvements" value="User Interface">
                                User Interface
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" name="improvements" value="Performance">
                                Performance
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" name="improvements" value="Customer Support">
                                Customer Support
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" name="improvements" value="Features">
                                Features
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">Submit Survey</button>
                    <p id="status-message"></p>
                </form>
            </div>

            <div id="success-message" style="display: none;">
                <h2>✅ Thank You!</h2>
                <p>Your survey response has been recorded successfully!</p>
                <p style="font-size: 12px; color: #999;">Your data is stored locally in your browser</p>
                <div class="data-display" id="submitted-data"></div>
                <button class="btn-new-survey" onclick="location.reload()">Submit Another Response</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize storage
        if (!localStorage.getItem('surveyResponses')) {
            localStorage.setItem('surveyResponses', JSON.stringify([]));
        }

        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(document.getElementById('form'));
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                rating: formData.get('rating'),
                experience: formData.get('experience'),
                improvements: formData.getAll('improvements'),
                timestamp: new Date().toLocaleString()
            };

            const statusMessage = document.getElementById('status-message');
            statusMessage.textContent = 'Submitting...';
            statusMessage.className = '';

            try {
                // Simulate server delay
                await new Promise(resolve => setTimeout(resolve, 500));

                // Save to localStorage
                const responses = JSON.parse(localStorage.getItem('surveyResponses'));
                responses.push(data);
                localStorage.setItem('surveyResponses', JSON.stringify(responses));

                // Show success message
                document.getElementById('survey-form').style.display = 'none';
                document.getElementById('success-message').style.display = 'block';
                document.getElementById('submitted-data').textContent = JSON.stringify(data, null, 2);

                console.log('✅ Survey saved! Total responses:', responses.length);
            } catch (error) {
                statusMessage.textContent = 'Error submitting survey. Please try again.';
                statusMessage.className = 'error';
                console.error('Error:', error);
            }
        });

        // Log all stored responses
        window.viewResponses = function() {
            const responses = JSON.parse(localStorage.getItem('surveyResponses'));
            console.log('All Survey Responses:', responses);
            alert(`Total responses: ${responses.length}\n\nCheck browser console (F12) to see all data`);
        };

        console.log('📋 Survey loaded! Type viewResponses() to see all collected data');
    </script>
</body>
</html>
