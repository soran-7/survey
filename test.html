<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form - Working Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .survey-wrapper {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        h2 {
            color: #667eea;
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .checkbox-group {
            margin-bottom: 25px;
        }

        .checkbox-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .success-box {
            background: #d4edda;
            border: 2px solid #28a745;
            color: #155724;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            text-align: center;
        }

        .success-box h2 {
            color: #155724;
            margin-bottom: 15px;
        }

        .data-box {
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 12px;
            max-height: 250px;
            overflow-y: auto;
            font-family: monospace;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .button-group button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-new {
            background: #667eea;
            color: white;
        }

        .btn-view {
            background: #28a745;
            color: white;
        }

        .hidden {
            display: none !important;
        }

        .error {
            color: #d32f2f;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="survey-wrapper">
            <!-- SURVEY FORM -->
            <div id="formSection">
                <h1>📋 Customer Survey</h1>
                <p class="subtitle">Tell us what you think!</p>

                <form id="surveyForm" onsubmit="handleSubmit(event)">
                    <div class="form-group">
                        <label for="name">Your Name *</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                        <div class="error" id="nameError"></div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" placeholder="john@example.com" required>
                        <div class="error" id="emailError"></div>
                    </div>

                    <div class="form-group">
                        <label for="rating">How would you rate us? *</label>
                        <select id="rating" required>
                            <option value="">-- Select --</option>
                            <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                            <option value="4">⭐⭐⭐⭐ Very Good</option>
                            <option value="3">⭐⭐⭐ Good</option>
                            <option value="2">⭐⭐ Fair</option>
                            <option value="1">⭐ Poor</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="feedback">Your Feedback</label>
                        <textarea id="feedback" placeholder="Tell us more..."></textarea>
                    </div>

                    <div class="form-group checkbox-group">
                        <label>What should we improve?</label>
                        <div class="checkbox-options">
                            <label class="checkbox">
                                <input type="checkbox" name="improvements" value="UI/UX">
                                🎨 UI/UX Design
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" name="improvements" value="Speed">
                                ⚡ Performance/Speed
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" name="improvements" value="Support">
                                💬 Customer Support
                            </label>
                            <label class="checkbox">
                                <input type="checkbox" name="improvements" value="Features">
                                ✨ More Features
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">✅ SUBMIT SURVEY</button>
                </form>
            </div>

            <!-- SUCCESS MESSAGE -->
            <div id="successSection" class="hidden">
                <div class="success-box">
                    <h2>🎉 Thank You!</h2>
                    <p>Your response has been recorded successfully!</p>
                    
                    <div class="data-box" id="displayData"></div>

                    <div class="button-group">
                        <button class="btn-new" onclick="newSurvey()">📝 New Response</button>
                        <button class="btn-view" onclick="viewAllResponses()">👁️ View All</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize storage
        function initStorage() {
            if (!localStorage.getItem('surveyData')) {
                localStorage.setItem('surveyData', JSON.stringify([]));
            }
        }

        initStorage();

        // Handle form submission
        function handleSubmit(event) {
            event.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const rating = document.getElementById('rating').value;
            const feedback = document.getElementById('feedback').value.trim();
            const improvements = Array.from(document.querySelectorAll('input[name="improvements"]:checked'))
                .map(cb => cb.value);

            // Validation
            let valid = true;
            if (!name) {
                document.getElementById('nameError').textContent = 'Name is required';
                valid = false;
            }
            if (!email) {
                document.getElementById('emailError').textContent = 'Email is required';
                valid = false;
            }
            if (!rating) {
                valid = false;
            }

            if (!valid) {
                alert('❌ Please fill in all required fields');
                return;
            }

            // Create response object
            const response = {
                id: Date.now(),
                name: name,
                email: email,
                rating: rating,
                feedback: feedback,
                improvements: improvements,
                timestamp: new Date().toLocaleString()
            };

            // Save to storage
            const allResponses = JSON.parse(localStorage.getItem('surveyData'));
            allResponses.push(response);
            localStorage.setItem('surveyData', JSON.stringify(allResponses));

            // Show success
            showSuccess(response, allResponses.length);
        }

        // Show success message
        function showSuccess(data, totalCount) {
            document.getElementById('formSection').classList.add('hidden');
            document.getElementById('successSection').classList.remove('hidden');

            const display = `✅ RESPONSE #${totalCount} SAVED

Name: ${data.name}
Email: ${data.email}
Rating: ${data.rating}/5 ⭐
Feedback: ${data.feedback || '(empty)'}
Improvements: ${data.improvements.length > 0 ? data.improvements.join(', ') : '(none selected)'}
Time: ${data.timestamp}`;

            document.getElementById('displayData').textContent = display;

            // Log to console
            console.log('✅ Survey Response Saved!', data);
            console.log('📊 Total Responses:', totalCount);
        }

        // New survey
        function newSurvey() {
            document.getElementById('surveyForm').reset();
            document.getElementById('formSection').classList.remove('hidden');
            document.getElementById('successSection').classList.add('hidden');
            document.getElementById('nameError').textContent = '';
            document.getElementById('emailError').textContent = '';
        }

        // View all responses
        function viewAllResponses() {
            const allResponses = JSON.parse(localStorage.getItem('surveyData'));
            
            if (allResponses.length === 0) {
                alert('📭 No responses yet');
                return;
            }

            let display = `📊 TOTAL RESPONSES: ${allResponses.length}\n\n`;
            
            allResponses.forEach((resp, index) => {
                display += `━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                display += `RESPONSE #${index + 1}\n`;
                display += `Name: ${resp.name}\n`;
                display += `Email: ${resp.email}\n`;
                display += `Rating: ${resp.rating}/5 ⭐\n`;
                display += `Feedback: ${resp.feedback || '(none)'}\n`;
                display += `Improvements: ${resp.improvements.length > 0 ? resp.improvements.join(', ') : '(none)'}\n`;
                display += `Time: ${resp.timestamp}\n`;
            });

            alert(display);
            console.log('All Responses:', allResponses);
        }

        // On load
        console.log('✅ Survey app loaded and working!');
        console.log('Type in console: viewAllResponses()');
    </script>
</body>
</html>
