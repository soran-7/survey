<!DOCTYPE html>
<html>
<head>
<title>SURVEY</title>
<style>
body { font-family: Arial; background: #667eea; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
.box { background: white; padding: 30px; border-radius: 10px; width: 500px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
h1 { color: #333; margin-top: 0; }
input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
button:hover { background: #5568d3; }
.hidden { display: none; }
.success { background: #d4edda; border: 2px solid #28a745; padding: 20px; border-radius: 5px; color: #155724; text-align: center; }
.data { background: #f5f5f5; padding: 15px; margin: 15px 0; border-radius: 5px; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>
<div class="box">
  <div id="form">
    <h1>📋 Survey Form</h1>
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="email" id="email" placeholder="Your Email" required>
    <select id="rating" required>
      <option value="">Select Rating</option>
      <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
      <option value="4">⭐⭐⭐⭐ Very Good</option>
      <option value="3">⭐⭐⭐ Good</option>
      <option value="2">⭐⭐ Fair</option>
      <option value="1">⭐ Poor</option>
    </select>
    <textarea id="feedback" placeholder="Your Feedback" rows="4"></textarea>
    <div style="margin-top: 10px;">
      <label><input type="checkbox" name="improve" value="UI/UX"> UI/UX</label>
      <label><input type="checkbox" name="improve" value="Speed"> Speed</label>
      <label><input type="checkbox" name="improve" value="Support"> Support</label>
    </div>
    <button onclick="submitForm()">✅ SUBMIT</button>
  </div>

  <div id="success" class="hidden">
    <div class="success">
      <h2>🎉 THANK YOU!</h2>
      <p>Your response was saved successfully!</p>
      <div class="data" id="showData"></div>
      <button onclick="reset()">New Response</button>
      <button onclick="showAll()">View All</button>
    </div>
  </div>
</div>

<script>
function submitForm() {
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const rating = document.getElementById('rating').value;
  const feedback = document.getElementById('feedback').value;
  const improve = Array.from(document.querySelectorAll('input[name="improve"]:checked')).map(x => x.value);

  if (!name || !email || !rating) {
    alert('Fill all required fields!');
    return;
  }

  const data = {
    name: name,
    email: email,
    rating: rating,
    feedback: feedback,
    improvements: improve,
    time: new Date().toLocaleString()
  };

  let all = JSON.parse(localStorage.getItem('surveys')) || [];
  all.push(data);
  localStorage.setItem('surveys', JSON.stringify(all));

  document.getElementById('showData').innerText = 'Name: ' + name + '\nEmail: ' + email + '\nRating: ' + rating + '/5\nFeedback: ' + (feedback || 'None') + '\nImprovements: ' + (improve.length > 0 ? improve.join(', ') : 'None') + '\nTime: ' + data.time + '\n\nTotal Responses: ' + all.length;

  document.getElementById('form').classList.add('hidden');
  document.getElementById('success').classList.remove('hidden');

  console.log('✅ Survey Saved!', data);
  console.log('Total responses:', all.length);
}

function reset() {
  document.getElementById('name').value = '';
  document.getElementById('email').value = '';
  document.getElementById('rating').value = '';
  document.getElementById('feedback').value = '';
  document.querySelectorAll('input[name="improve"]').forEach(x => x.checked = false);
  document.getElementById('form').classList.remove('hidden');
  document.getElementById('success').classList.add('hidden');
}

function showAll() {
  let all = JSON.parse(localStorage.getItem('surveys')) || [];
  if (all.length === 0) {
    alert('No responses yet');
    return;
  }
  let msg = '📊 TOTAL: ' + all.length + '\n\n';
  all.forEach((d, i) => {
    msg += (i+1) + '. ' + d.name + ' (' + d.email + ') - Rating: ' + d.rating + '/5\n';
  });
  alert(msg);
  console.log('All responses:', all);
}

console.log('✅ Survey ready! Type showAll() to see responses');
</script>
</body>
</html>
